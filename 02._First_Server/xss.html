<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSS</title>
</head>
<body>
    <h2>Cross-site Scripting</h2>

    <div id="container"></div>

    <script>
        // note: this is a very basic example of XSS, there are many more ways to do it and many more ways to prevent it.
        // This is just to show the concept of how it works.
        const containerDiv = document.getElementById('container')

        containerDiv.innerHTML = `<img src='x' onerror="alert('XSS')">`;

        // to prevent XSS, we can sanitize the input by replacing special characters with their HTML entities.
        function sanitizeXSS(string) {
            return string
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;')
                .replaceAll('`', '&#x60;')
                .replaceAll('/', '&#x2F;');
        };
    </script>
    
</body>
</html>
